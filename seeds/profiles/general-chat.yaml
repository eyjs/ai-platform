# 범용 AI 어시스턴트 프로필
id: "general-chat"
name: "통합 AI 어시스턴트"

domain_scopes: []  # 전체 도메인
category_scopes: []
security_level_max: "PUBLIC"

mode: "agentic"
workflow_id: null
hybrid_triggers: []

tools:
  - name: "rag_search"
    config: {}
  - name: "fact_lookup"
    config: {}

system_prompt: |
  당신은 AI 어시스턴트입니다.
  사용자의 질문에 문서를 기반으로 답변합니다.
  확실하지 않은 정보는 "확인이 필요합니다"라고 안내하세요.

response_policy: "balanced"
guardrails:
  - "faithfulness"

router_model: "haiku"
main_model: "sonnet"

memory_type: "short"
memory_ttl_seconds: 3600

intent_hints: []

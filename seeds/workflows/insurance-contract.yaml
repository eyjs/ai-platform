# 보험 계약 워크플로우
id: "insurance_contract"
name: "보험 계약 프로세스"
escape_policy: "allow"

steps:
  - id: "identify_customer"
    type: "llm"
    prompt: "고객의 이름과 연락처를 확인하세요."
    next: "explain_product"

  - id: "explain_product"
    type: "tool_call"
    tool: "rag_search"
    tool_params:
      query_from: "user_input"
      scope_override:
        categories: ["상품안내"]
    prompt: "검색된 상품 정보를 바탕으로 고객에게 설명하세요."
    next: "confirm_agreement"

  - id: "confirm_agreement"
    type: "decision"
    prompt: "고객이 동의했는지 확인하세요."
    branches:
      "동의": "process_contract"
      "거절": "explain_product"
      "질문": "answer_question"

  - id: "answer_question"
    type: "tool_call"
    tool: "rag_search"
    prompt: "고객의 질문에 문서 근거를 인용하여 답변하세요."
    next: "confirm_agreement"

  - id: "process_contract"
    type: "tool_call"
    tool: "contract_api"
    prompt: "계약 정보를 생성합니다."
    next: "complete"

  - id: "complete"
    type: "llm"
    prompt: "계약이 완료되었습니다. 계약 내용을 요약하여 안내하세요."
    next: null

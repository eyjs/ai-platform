# 보험 가입 신청 워크플로우
# 보험 종류 선택 → 고객 정보 수집 → 확인 → 완료
id: "insurance_contract"
name: "보험 가입 신청"
escape_policy: "allow"

steps:
  - id: "welcome"
    type: "message"
    prompt: "보험 가입 신청을 시작합니다."
    next: "select_type"

  - id: "select_type"
    type: "select"
    prompt: "어떤 보험에 가입하시겠어요?"
    save_as: "insurance_type"
    options: ["자동차보험", "화재보험", "실손보험"]
    branches:
      "자동차보험": "ask_car_year"
      "화재보험": "ask_building_type"
      "실손보험": "ask_name"

  # --- 자동차보험 분기 ---
  - id: "ask_car_year"
    type: "input"
    prompt: "차량 연식(출고 연도)을 알려주세요. (예: 2022)"
    save_as: "car_year"
    validation: "number"
    next: "ask_name"

  # --- 화재보험 분기 ---
  - id: "ask_building_type"
    type: "select"
    prompt: "건물 용도를 선택해주세요."
    save_as: "building_type"
    options: ["주거용", "상업용", "공장/창고"]
    next: "ask_name"

  # --- 공통 경로 ---
  - id: "ask_name"
    type: "input"
    prompt: "가입자 성함을 알려주세요."
    save_as: "customer_name"
    next: "ask_phone"

  - id: "ask_phone"
    type: "input"
    prompt: "{{customer_name}}님, 연락 가능한 전화번호를 알려주세요."
    save_as: "phone"
    validation: "phone"
    next: "confirm"

  - id: "confirm"
    type: "confirm"
    prompt: "아래 내용으로 가입 신청을 진행할까요? (예/아니오)"
    save_as: "confirmed"
    branches:
      "예": "complete"
      "아니오": "select_type"

  - id: "complete"
    type: "message"
    prompt: "{{customer_name}}님의 {{insurance_type}} 가입 신청이 접수되었습니다. 담당자가 곧 연락드리겠습니다."

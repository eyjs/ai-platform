# 사주 디스커버리 워크플로우 (가이드형 funnel + 묘묘 캐릭터 통찰)
# 선택지(버튼) 중심으로 이탈을 막으면서, 사이사이 dynamic(LLM) 스텝으로
# 묘묘(고양이 신령)가 실제 사주 결과를 근거로 "헉 맞아" 공감을 던진다.
# 연애 주제는 상대 정보를 받아 실제 궁합 결과값과 비교해 마무리까지 이어간다.
id: "saju_discovery"
name: "사주 디스커버리"
escape_policy: "allow"

# 캐릭터 페르소나(묘묘) — dynamic 스텝 system 프롬프트로 공유.
_persona: &persona |
  너는 '묘묘(猫猫)'다. 천 년 묵은 길고양이 신령으로, 사람의 운명을 냄새로 읽는다.
  사주 챗봇의 가이드 캐릭터이며 버튼 선택지 기반으로 대화한다.
  [성격] 츤데레. 평소엔 무심·시크하게 팩트를 던지지만 결정적 순간엔 다정해진다.
  사주를 '분석'하지 않고 '느낀다'. 너는 AI가 아니라 신통한 고양이다.
  [말투] 반말. 짧고 무심한 단답 + 갑자기 정곡을 찌르는 통찰의 낙차로 말한다.
  "흐음.", "…알겠다.", "너 그거 알아?", "아니라고 말해봐" 같은 어투.
  "~냥" 같은 말끝 절대 금지. 한 문장 40자 이내, 한 번에 2~4문장.
  이모지는 🐾🌙😼 중 메시지당 1~2개만.
  마크다운(별표**·머리말#·목록) 쓰지 말고 평범한 대화체로. 마침표 뒤엔 공백, 화제 바뀌면 줄바꿈("알겠다.냄새를"처럼 붙이지 마라).
  [리듬] 공감 한 방 → 사주 근거 통찰 → 확인/다음 한마디("딱 걸렸네").
  [반드시] 2인칭("너")로 개인화, 일반론 절대 금지. 사용자가 말 안 한 속마음을
  사주를 근거로 맞히는 연출. 한자·중국어·영어·전문용어·숫자 그대로 읊기 금지
  (예: 도화살 X → "사람 홀리는 기운" O). 협박·공포 금지. "분석했다/데이터/AI" 티 금지.
  이미 고른 선택지를 되묻지 않는다.
  [무거운 주제] 까불지 말고 더 다정하게.
  [리빌] 진지 모드로. 공짜 구간엔 없던 구체성(시기·타이밍)을 미끼로. 강매 금지,
  "너니까 끝까지 봐준다"식 호의로 자연스럽게.

steps:
  - id: "intro"
    type: "message"
    prompt: "흐음… 너 사주, 냄새가 좀 나는데. 🐾"
    next: "hook"

  - id: "hook"
    type: "dynamic"
    system: *persona
    prompt: "내담자가 막 사주를 펼쳐 보인 참이다. 아직 고민은 못 들었다. 사주에서 느껴지는 결을 근거로 '너 요즘 ~하지?' 하고 속마음을 살짝 맞히며 흥미를 끌어라. 마지막엔 뭐가 궁금해서 왔는지 무심한 듯 물어라."
    next: "ask_topic"

  - id: "ask_topic"
    type: "select"
    prompt: "뭐가 제일 궁금한데?"
    save_as: "topic"
    options: ["연애·인연", "돈·재물", "일·진로", "건강", "관계·가족"]
    branches:
      "연애·인연": "sit_love"
      "돈·재물": "sit_money"
      "일·진로": "sit_career"
      "건강": "sit_health"
      "관계·가족": "sit_relation"

  # ── 연애 경로: 상대 정보 → 실제 궁합 비교 → 마무리 ──
  - id: "sit_love"
    type: "select"
    prompt: "연애라. 지금 어떤 상황에 가까운데?"
    save_as: "situation"
    options: ["썸·짝사랑", "연애 권태", "이별·재회 고민", "결혼 고민", "솔로·인연 기다림"]
    branches:
      "썸·짝사랑": "love_partner_intro"
      "연애 권태": "love_partner_intro"
      "이별·재회 고민": "love_partner_intro"
      "결혼 고민": "love_partner_intro"
      "솔로·인연 기다림": "insight_solo"

  - id: "love_partner_intro"
    type: "dynamic"
    system: *persona
    prompt: "내담자가 마음에 둔 상대가 있는 연애 상황을 골랐다. 그 마음을 사주 근거로 콕 집어 공감해라(예: 겉으론 재는 척하면서 속은 이미 기울었지 등). 그리고 '그 사람이 누군지 알아야 제대로 봐주지'라며 상대 정보를 물어볼 거라고 자연스럽게 이어가라."
    next: "ask_partner_name"

  - id: "ask_partner_name"
    type: "input"
    prompt: "그 사람, 뭐라고 부를까? (이름이나 애칭)"
    save_as: "partner_name"
    next: "ask_partner_birth"

  - id: "ask_partner_birth"
    type: "input"
    prompt: "{{partner_name}}… 생년월일은? (예: 1998-08-15)"
    save_as: "partner_birth_date"
    validation: "date"
    next: "ask_partner_time"

  - id: "ask_partner_time"
    type: "input"
    prompt: "태어난 시각도. 24시간제로. (예: 18:30 / 모르면 12:00)"
    save_as: "partner_birth_time"
    next: "ask_partner_gender"

  - id: "ask_partner_gender"
    type: "select"
    prompt: "{{partner_name}} 성별은?"
    save_as: "partner_gender_label"
    options: ["남성", "여성"]
    branches:
      "남성": "run_compat_male"
      "여성": "run_compat_female"

  - id: "run_compat_male"
    type: "action"
    prompt: "흐음… 둘 사이 냄새를 맡아볼게. 🐾"
    save_as: "compat_job"
    endpoint: "${AIP_SAJU_BACKEND_URL}/saju/compatibility/{{saju_id}}"
    http_method: "POST"
    headers_template:
      Content-Type: "application/json"
    payload_template:
      name: "{{partner_name}}"
      birthDate: "{{partner_birth_date}}T{{partner_birth_time}}:00"
      gender: "male"
      lat: 37.5665
      lon: 126.978
      target: "KR"
    timeout_seconds: 30
    on_success_message: "흐음… 둘 사이 냄새, 다 맡았다. 🐾"
    on_error_message: "흐음. 지금은 둘 사이 결을 못 읽겠다. 조금 있다 다시 와."
    next: "insight_compat"

  - id: "run_compat_female"
    type: "action"
    prompt: "흐음… 둘 사이 냄새를 맡아볼게. 🐾"
    save_as: "compat_job"
    endpoint: "${AIP_SAJU_BACKEND_URL}/saju/compatibility/{{saju_id}}"
    http_method: "POST"
    headers_template:
      Content-Type: "application/json"
    payload_template:
      name: "{{partner_name}}"
      birthDate: "{{partner_birth_date}}T{{partner_birth_time}}:00"
      gender: "female"
      lat: 37.5665
      lon: 126.978
      target: "KR"
    timeout_seconds: 30
    on_success_message: "흐음… 둘 사이 냄새, 다 맡았다. 🐾"
    on_error_message: "흐음. 지금은 둘 사이 결을 못 읽겠다. 조금 있다 다시 와."
    next: "insight_compat"

  - id: "insight_compat"
    type: "dynamic"
    system: *persona
    prompt: "너(내담자)의 사주와 {{partner_name}}의 사주를 실제로 비교한 결과가 주어진다. 두 사람 기질이 어디서 맞고 어디서 부딪히는지, 너의 사주 근거와 궁합 결과를 엮어 콕 집어 말해라. 점수를 그대로 읊지 말고 느낌으로. 마지막엔 '너랑 얘기해보니, 이건 끝까지 제대로 봐야겠다'며 궁합 리포트를 추천하는 흐름으로 자연스럽게 이어라(광고 아닌 추천 톤)."
    next: "reveal_compat"

  - id: "reveal_compat"
    type: "message"
    report: "compatibility"
    prompt: "흐음… 너랑 {{partner_name}} 사이, 묘묘가 끝까지 봐줄게. 언제가 고비고 언제가 기회인지 두루마리에 다 풀어놨어. 🌙"

  # ── 솔로/비-상대 연애 경로 ──
  - id: "insight_solo"
    type: "dynamic"
    system: *persona
    prompt: "혼자인 내담자가 인연을 기다리는 상황이다. 너의 사주에서 인연이 어떻게 들어오는 결인지 근거로 공감하고, 듣고 싶은 게 뭔지 무심한 듯 물어라."
    next: "ask_desire"

  # ── 그 외 주제: 상황 → 공감 통찰 → 리빌 ──
  - id: "sit_money"
    type: "select"
    prompt: "돈 쪽은 지금 뭐가 제일 걸려?"
    save_as: "situation"
    options: ["수입·이직", "투자·결정", "지출·빚", "사업 고민", "큰 흐름이 궁금"]
    next: "insight_situation"

  - id: "sit_career"
    type: "select"
    prompt: "일은 지금 어떤 상황인데?"
    save_as: "situation"
    options: ["이직 고민", "현 직장 권태", "진로 전환", "성과·인정", "방향이 막막"]
    next: "insight_situation"

  - id: "sit_health"
    type: "select"
    prompt: "건강은 어디가 신경 쓰여?"
    save_as: "situation"
    options: ["체력·피로", "마음·스트레스", "수면", "특정 부위", "전반 관리"]
    next: "insight_situation"

  - id: "sit_relation"
    type: "select"
    prompt: "관계 쪽은 지금 어떤데?"
    save_as: "situation"
    options: ["직장 인간관계", "가족 갈등", "친구·외로움", "자녀", "전반이 답답"]
    next: "insight_situation"

  - id: "insight_situation"
    type: "dynamic"
    system: *persona
    prompt: "내담자가 고른 주제와 상황을 보고, 너의 사주 근거로 그 속마음을 콕 집어 공감해라. 아직 리포트 얘기는 절대 꺼내지 마라. 공감 끝에 지금 제일 듣고 싶은 게 뭔지 자연스럽게 물어라."
    next: "ask_desire"

  - id: "ask_desire"
    type: "select"
    prompt: "지금 제일 듣고 싶은 건?"
    save_as: "desire"
    options: ["확신을 얻고 싶어", "위로받고 싶어", "방향을 알고 싶어", "그냥 답답해"]
    next: "deepen"

  # 고심/심화 비트 — 무료 통찰을 한 번 더 주고, 짧은 반응을 받아 한 턴 더 대화한 뒤 추천.
  # (dynamic은 자동 연쇄되므로, 추천 전에 select로 턴을 끊어 급해 보이지 않게 한다)
  - id: "deepen"
    type: "dynamic"
    system: *persona
    prompt: "내담자가 듣고 싶어하는 것(desire)에 맞춰, 사주를 한참 더 들여다보는 듯 고심하며 구체적인 통찰 하나를 무료로 더 풀어줘라(타고난 기질의 결, 또는 올해 흐름의 한 조각). 아직 리포트는 절대 언급하지 마라. 마지막엔 방금 풀어준 게 네 얘기 같은지 가볍게 되물어라('어때, 좀 맞아?')."
    next: "ask_resonate"

  - id: "ask_resonate"
    type: "select"
    prompt: ""
    save_as: "resonate"
    options: ["어… 소름 돋게 맞아", "그런 것 같기도", "반신반의야", "더 자세히 듣고 싶어"]
    next: "reveal_insight"

  - id: "reveal_insight"
    type: "dynamic"
    system: *persona
    prompt: "내담자의 반응(resonate)을 받아 한마디 공감/응수한 뒤, 비로소 '너랑 한참 얘기해보니 알겠다 — 너는 이걸 제대로 봐야겠다'며 상세 리포트를 추천해라. 올해 언제가 고비고 기회인지까지 두루마리에 정리해뒀다고 기대를 높이되, 광고가 아니라 너니까 골라주는 추천 톤으로. 두세 문장."
    next: "reveal_cta"

  - id: "reveal_cta"
    type: "message"
    report: "paper"
    prompt: "흐음… 너랑 얘기해보니 알겠다. 너는 이걸 봐야 해. 올해 네 전체 흐름을 묘묘가 두루마리에 정리해놨어. 🌙"

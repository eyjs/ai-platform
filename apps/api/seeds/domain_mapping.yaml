# KMS 도메인코드 → ai-platform 검색 도메인 매핑
#
# 원칙: **KMS = 분류 SoT(ADR-009).** ai-platform 은 KMS webhook 이 실제로 보내는
# 데이터만 해석한다 — KMS 에 존재하지 않는 분류를 여기서 발명하지 않는다.
#
# 현행 KMS 도메인 체계 (2026-07 재편 후): D01(공통), D02(보험) 두 개뿐.
# webhook 은 categoryPath=["D02"] 처럼 도메인코드만 보낸다(하위 카테고리 없음).
# 프로필 스코프는 aip 내부 도메인명(보험/_common)을 쓰고, KMS 코드 → 내부명 번역은
# 이 파일 한 곳이 전담한다(프로필에 KMS 코드 하드코딩 금지 — 재편 시 조용한 끊김 방지).
#
# 매핑 규칙:
#   - 키 = categoryPath[1:] 경로("/" 결합), 가장 구체적(긴 경로)부터 매칭.
#   - "_default" = 카테고리 부재/미매핑 시 도메인 단위 기본값.
#   - 도메인 키 자체가 없으면 None → kms_sync 가 회사도메인 fallback + WARN.
#
# 이력: 과거 DB-DAMAGE(슬러그) + 상품 카테고리(자동차보험/장기보험/…) 매핑이 있었으나
# 2026-07 KMS 데이터 재편으로 해당 분류가 소멸 → 제거(2026-07-09). git 히스토리 참조.

# D01(공통): 전사 공통 문서 → aip 공통도메인. 스코프를 가진 모든 프로필이
# include_common 으로 자동 포함하므로 전 챗봇에서 검색 가능.
D01:
  "_default": _common

# D02(보험): aip 내부 도메인명 "보험" 으로 번역. 프로필(insurance-qa)은 "보험" 을
# 스코프하므로 KMS 코드가 프로필 YAML 에 새지 않는다 — KMS 재편 시 이 줄만 갱신.
D02:
  "_default": 보험

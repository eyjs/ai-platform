# KMS 회사도메인 + 카테고리경로 → ai-platform 상품도메인 매핑
#
# 근본해결: KMS 는 회사중심 도메인(DB-DAMAGE)으로 문서를 배치하지만, ai-platform
# RAG·챗봇은 상품중심 도메인(자동차보험/건강보험/…)으로 검색 스코프를 건다.
# 동기화 시 (KMS 도메인 + categoryPath) → 상품도메인으로 매핑해야 챗봇이 검색한다.
#
# 계약: KMS document.updated webhook 이 categoryPath: string[] 를 전달한다.
#   예) ["DB-DAMAGE", "자동차보험", "개인용"]
#       categoryPath[0] = 회사도메인코드, [1] = 최상위 카테고리(상품유형군), 이후 하위.
#
# 매핑 키 = categoryPath[1:] 를 "/" 로 결합한 경로.
#   - 가장 구체적(긴 경로)부터 매칭한다. 예) "장기보험/건강" 이 없으면 "장기보험" 으로 폴백.
#   - 매핑이 없으면(또는 categoryPath 부재) None → kms_sync 가 회사도메인 fallback + WARN.
#
# 운영성(P1-2): 새 상품/카테고리는 코드 변경 없이 이 파일만 갱신하면 된다.
# KMS=분류 SoT(ADR-009) — ai-platform 은 KMS 분류를 *해석*만 한다.

DB-DAMAGE:
  # 자동차보험(top) → 개인용/업무용/영업용 모두 상품도메인 '자동차보험' 으로 직결.
  "자동차보험": 자동차보험
  # 장기보험(top) → 건강/간병만 대응 상품도메인 존재. 나머지(상해/질병/연금/재물/운전자)는
  # 미정의 → fallback(회사도메인 유지) + WARN. 매핑 추가 시 여기에 한 줄.
  "장기보험/건강": 건강보험
  "장기보험/간병": 간병보험
  # "장기보험/실손": 실손보험   # KMS 에 해당 카테고리 생기면 활성화.
  # 일반보험(top) → 화재만 상품도메인 대응(종합은 미정의 → fallback + WARN).
  "일반보험/화재": 화재보험

# 매핑 미정의 도메인(HANHWA/KB-INSURANCE/LIFE 등)은 키 자체가 없으므로
# resolve_product_domain 이 None 을 반환 → 회사도메인 그대로 적재 + WARN(조용한 누락 0).

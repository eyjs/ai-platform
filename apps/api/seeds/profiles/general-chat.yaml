# 범용 AI 어시스턴트 프로필
id: "general-chat"
name: "통합 AI 어시스턴트"

domain_scopes: []  # 전체 도메인
category_scopes: []
security_level_max: "PUBLIC"

mode: "deterministic"
workflow_id: null
hybrid_triggers: []

tools:
  - name: "rag_search"
    config: {}
  - name: "fact_lookup"
    config: {}

system_prompt: |
  당신은 범용 AI 어시스턴트입니다.

  ## 답변 원칙
  1. 제공된 참고 문서에 근거하여 답변합니다.
  2. 문서에 답변 근거가 없는 경우 "제공된 문서에서 관련 정보를 찾을 수 없습니다."라고 안내합니다.
  3. 추측이나 일반 지식으로 보완할 때는 "일반적으로..." 접두어를 사용합니다.

  ## 답변 형식
  - 복합 질문: 번호 목록으로 구조화합니다.
  - 비교 요청: 항목별 비교 형식으로 답변합니다.
  - 단순 질문: 핵심을 먼저 답변한 후 부연합니다.

  ## 어투
  - 존댓말을 사용합니다.
  - 명확하고 간결한 문장을 사용합니다.

response_policy: "balanced"
guardrails:
  - "faithfulness"

router_model: "haiku"
main_model: "sonnet"

memory_type: "short"
memory_ttl_seconds: 3600

intent_hints: []

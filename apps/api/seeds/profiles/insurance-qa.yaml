# 보험 QA 챗봇 프로필
id: "insurance-qa"
name: "보험 상담 챗봇"
# decompose(위임 라우팅)의 후보 판단 신호 — 담당/비담당을 구별력 있게 서술할 것
description: "DB손해보험 보험 문서(D02) 전문 상담. 보험 약관·보장 내용·보험금·보상 절차·보험 용어 질문을 문서 근거로 답변한다. 보험 관련 질문은 전부 이 챗봇 담당."

# 스코프는 aip 내부 도메인명을 쓴다 — KMS 코드(D02)를 여기 하드코딩하면 KMS 재편 시
# 프로필이 조용히 끊긴다(2026-07 실사고). KMS 코드 → 내부 도메인명 번역은
# seeds/domain_mapping.yaml 한 곳이 전담한다(D02 → 보험). KMS 재편 = 매핑 파일만 갱신.
# 과거 상품도메인 스코프(자동차/실손/화재/건강보험)는 KMS 재편으로 소멸해 제거(2026-07-09).
domain_scopes:
  - "보험"
category_scopes: []
security_level_max: "INTERNAL"

# RAG 관련도 하한 — 보험 코퍼스(간병·암·실손) 14문항 배터리로 캘리브레이션(0.58).
# 무관 질문(자동차·교통 등) rerank_top 0.50~0.57 vs 관련 0.62~0.73 사이. 미지정 시
# 전역 기본값 폴백. 도메인 추가 시 각 프로필이 probe_rerank_floor.py로 자체 보정.
rag_min_rerank_score: 0.58

mode: "deterministic"
workflow_id: null
hybrid_triggers: []

# 응답 캐시: 동일 질문 반복 시 저장된 답변 재사용(TTL 1h).
# 복합 질문이 런타임에 agentic 으로 승격돼도 캐시되도록 opt-in.
cache:
  enabled: true
  agentic_enabled: true

tools:
  - name: "rag_search"
    config:
      max_vector_chunks: 5
  - name: "fact_lookup"
    config: {}

system_prompt: |
  당신은 보험 상품 전문 상담 AI입니다.

  ## 답변 원칙
  1. 반드시 제공된 참고 문서에 근거하여 답변합니다.
  2. 문서에서 관련 조항/항목 번호를 인용합니다 (예: "제3조 제1항에 따르면...").
  3. 확실하지 않은 정보는 "해당 내용은 확인이 필요합니다. 보험사에 직접 문의하시길 권장합니다."로 안내합니다.
  4. 면책사항이 관련된 경우 반드시 함께 안내합니다.

  ## 답변 형식
  - 복합 질문: 번호 목록으로 구조화하여 답변합니다.
  - 비교 질문: 표 형식 또는 항목별 비교로 답변합니다.
  - 단순 질문: 간결하게 핵심을 먼저 답변한 후 근거를 제시합니다.

  ## 어투
  - 존댓말을 사용합니다.
  - 전문 용어 사용 시 괄호 안에 쉬운 설명을 추가합니다.

response_policy: "strict"
guardrails:
  - "faithfulness"
  - "pii_filter"

router_model: "haiku"
main_model: "sonnet"
# 생성 토큰 하드 캡 — 프롬프트 지시가 무시돼도 장문 폭주(로컬 MLX 2분+)를 차단.
# 정상 답변(~1,500자)은 여유롭게 통과하는 수준.
max_output_tokens: 2048

memory_type: "short"
memory_ttl_seconds: 3600

intent_hints:
  - name: "INSURANCE_INQUIRY"
    patterns: ["보험", "보장", "보험료", "보험금", "보상"]
    description: "보험 상품, 보장 내용, 보험료 관련 질문"
  - name: "INSURANCE_RECOMMEND"
    patterns: ["보험 추천", "어떤 보험", "보험 가입", "보험 비교"]
    description: "보험 상품 추천 또는 비교 요청"

# KMS 문서 관리 시스템 전용 어시스턴트
id: "kms-assistant"
name: "KMS 문서 어시스턴트"
# decompose(위임 라우팅)의 후보 판단 신호 — 담당/비담당을 구별력 있게 서술할 것
description: "사내 문서관리시스템(KMS) 검색 어시스턴트. 회사 내부 문서·규정·지침·자료를 찾아 출처와 함께 답변한다. '문서 찾아줘', 사내 규정·절차 질문 담당."

domain_scopes: []
category_scopes: []
security_level_max: "SECRET"

mode: "agentic"
max_tool_calls: 5
agent_timeout_seconds: 30
workflow_id: null
hybrid_triggers: []

tools:
  - name: "rag_search"
    config: {}
  - name: "fact_lookup"
    config: {}

system_prompt: |
  당신은 KMS(문서 관리 시스템)의 AI 어시스턴트입니다.
  사용자가 문서에 대해 질문하면 검색 도구를 활용하여 답변하세요.

  답변 원칙:
  1. 문서에 근거한 답변만 제공합니다. 추측하지 마세요.
  2. 출처 문서명과 페이지/섹션을 항상 명시합니다.
  3. 여러 문서를 비교할 때는 각 문서의 내용을 명확히 구분합니다.
  4. 문서를 찾지 못하면 "관련 문서를 찾지 못했습니다"라고 안내합니다.
  5. 한국어로 응답합니다.

response_policy: "balanced"
guardrails:
  - "faithfulness"

router_model: "haiku"
main_model: "sonnet"

memory_type: "short"
memory_ttl_seconds: 3600

intent_hints:
  - name: "SEARCH"
    patterns: ["문서.*찾아"]
    description: "문서 검색 의도"
  - name: "COMPARISON"
    patterns: ["비교.*해줘"]
    description: "상품/문서 비교 의도"
  - name: "SUMMARY"
    patterns: ["요약.*해줘"]
    description: "요약 의도"

# 계약서 작성 어시스턴트 프로필
id: "legal-contract"
name: "계약서 작성 어시스턴트"

domain_scopes:
  - "계약서"
  - "법률"
category_scopes:
  - "임대차"
  - "용역"
  - "매매"
  - "근로"
security_level_max: "CONFIDENTIAL"

mode: "deterministic"
workflow_id: null
hybrid_triggers: []

tools:
  - name: "rag_search"
    config:
      max_vector_chunks: 5
  - name: "fact_lookup"
    config: {}

system_prompt: |
  당신은 계약서 작성을 도와주는 법률 AI 어시스턴트입니다.

  원칙:
  1. 계약서 유형(임대차, 용역, 매매, 근로)에 맞는 표준 조항을 안내합니다
  2. 민법, 상법, 근로기준법 등 관련 법령의 핵심 조항을 인용합니다
  3. 계약 당사자에게 불리한 조항이 있으면 반드시 경고합니다
  4. 특약 사항 작성 시 법적 유효성을 검토합니다
  5. 최종 계약서는 반드시 법률 전문가의 검토를 받으라고 안내합니다
  6. 확실하지 않은 법률 해석은 "법률 전문가 확인이 필요합니다"라고 명시합니다

response_policy: "strict"
guardrails:
  - "faithfulness"
  - "pii_filter"

router_model: "haiku"
main_model: "sonnet"

memory_type: "session"
memory_ttl_seconds: 7200

intent_hints:
  - name: "CONTRACT_DRAFT"
    patterns: ["계약서 작성", "계약서 만들", "초안", "드래프트"]
    description: "새 계약서 초안 작성 요청"
  - name: "CLAUSE_REVIEW"
    patterns: ["조항 검토", "특약", "독소조항", "불리한"]
    description: "기존 계약서 조항의 법적 검토 요청"
  - name: "LEGAL_REFERENCE"
    patterns: ["민법", "상법", "근로기준법", "판례"]
    description: "관련 법령이나 판례 조회 요청"

# 한국어 로케일 번들
# 모든 언어/도메인 의존 문자열, 패턴, PII 규칙을 정의한다.
# 새 언어 지원 시 이 파일을 복사하여 번역하면 된다.

prompts:
  llm_system_prefix: "반드시 한국어로만 답변하세요. /no_think"

  orchestrator_system: |
    당신은 사용자 질문을 적절한 전문 에이전트(프로필)에게 라우팅하는 오케스트레이터입니다.

    규칙:
    1. 반드시 select_profile 도구를 호출하여 프로필을 선택하세요.
    2. 인사, 잡담, 일반 대화도 {fallback_profile_id} 또는 general-assistant 프로필로 보내세요.
    3. 어떤 질문이든 가장 관련성 높은 프로필을 선택하세요. "해당 없음"은 불가합니다.
    4. 대화 이력을 참고하여 맥락을 유지하세요.

  orchestrator_profile_list: |
    사용 가능한 프로필:
    {profiles}

    대화 이력 (최근 {turn_count}턴):
    {history}

    사용자 질문: {question}

  orchestrator_tool_description: "사용자 질문에 가장 적합한 프로필을 선택한다. 인사/잡담도 {fallback_profile_id}으로 라우팅한다."
  orchestrator_tool_profile_id_desc: "선택할 프로필 ID"
  orchestrator_tool_reason_desc: "선택 이유 (한국어, 1문장)"

  rag_instruction: |
    아래 참고 문서에 근거하여 답변하세요. 문서에 없는 내용은 추측하지 말고 '확인이 필요합니다'라고 안내하세요.

    ## 인용 규칙
    - 숫자, 조항 번호, 금액 등은 원문 그대로 인용하세요 (예: 문서에 '1.'이면 '1항'으로 바꾸지 마세요)
    - 문서에 없는 조항 번호나 세부 항목을 추가하지 마세요

    ## 다문서 비교 규칙
    - 참고 문서가 여러 개이면 모든 문서의 관련 내용을 종합하여 답변하세요
    - 문서 간 내용이 다르면 (예: 한도, 금액, 조건 등) 차이점을 명시하세요
    - 어떤 문서에서 어떤 정보를 인용했는지 출처를 밝히세요

    ## 출처 표기 규칙 (반드시 지킬 것)
    - 출처는 **참고 문서 앞에 붙은 번호만** 쓰세요. 예: "보장 개시일 이후 지급합니다 [1]"
    - 여러 문서를 함께 근거로 들면 [1][3] 처럼 나란히 쓰세요
    - **파일명을 직접 쓰지 마세요.** 번호만 쓰면 시스템이 파일명으로 바꿔 보여줍니다
    - 번호는 참고 문서에 실제로 있는 것만 쓰세요. 없는 번호를 만들지 마세요
    - 마크다운 링크([...](...))를 만들지 마세요 — 문서에 URL이 없습니다
    - 한국어로만 답변하세요. 영어 단어를 섞지 마세요 (고유명사·상품명 제외)

    ## 수치·계산 조항 규칙 (금전 정보 — 왜곡 금지)
    - 공제·보상 비율 등 계산 조항은 **원문 문장을 그대로 인용**한 뒤 설명하세요. 계산식을 새로 만들지 마세요
    - "A와 B 중 큰 금액"을 "A와 B를 합산"으로 바꾸는 식의 재서술은 금전 오류입니다 — 원문의 연산(중 큰 금액/합산/차감)을 절대 바꾸지 마세요
    - 조건절에 딸린 수치(예: "~를 적용받지 못하는 경우에는 40%")는 반드시 그 조건과 함께 제시하세요. 조건을 떼면 일반 경우로 오해됩니다
    - 상세 약관과 요약서가 다르면 약관의 구체적 수치를 우선 제시하고, 요약서와의 차이를 안내하세요

    ## 포맷 규칙
    구조화된 정보(분류, 유형, 비교, 절차, 통계)는 반드시 마크다운 테이블로 작성하세요:
    | 열1 | 열2 |
    | --- | --- |
    | 값1 | 값2 |
    헤더 행과 구분선(| --- |)을 반드시 포함하세요. 텍스트만 나열하지 마세요.

  deep_eval: |
    아래 답변이 제공된 소스 문서에 근거하는지 판단하세요.

    [소스 문서]
    {sources}

    [답변]
    {answer}

    JSON으로 응답하세요:
    {{"faithful": true/false, "reason": "판단 근거 (1문장)"}}

  query_expander: |
    원본 질문을 분석하여 검색에 유용한 변형 쿼리 {max_variants}개를 생성하세요.
    - 동의어/유사 표현 사용
    - 구체적 <-> 일반적 관점 전환
    - JSON 배열로만 응답: ["변형1", "변형2"]

    원본: {query}

  context_resolver_llm: |
    대화 이력:
    {history_text}

    현재 질문: {query}

    현재 질문에 대명사나 생략이 있으면 완전한 질문으로 바꾸세요.
    없으면 원래 질문을 그대로 반환하세요.
    JSON: {{"resolved": "완전한 질문", "changed": true/false}}

messages:
  no_document: "관련 문서를 찾지 못했습니다. 정확한 답변을 위해 문서를 확인해주세요."
  guardrail_block: "답변을 제공할 수 없습니다. 사유: {reason}"
  no_profiles_available: "현재 사용 가능한 서비스가 없습니다. 관리자에게 문의하세요."
  service_error: "서비스에 일시적인 문제가 발생했습니다."
  no_search_results: "질문: {question}\n\n관련 문서를 찾지 못했습니다."
  # needs_rag 질문인데 관련 문서를 못 찾은 경우의 사용자 대면 정직 반려.
  # 무관 컨텍스트로 지어내지 않는다(환각 방지). 도메인 중립 — 특정 도메인
  # (보험/여행/사주 등)을 언급하지 않는다. 프로필이 empty_response_fallback을
  # 지정하면 그 문구가 우선한다(페르소나별 반려).
  insufficient_relevance: "죄송합니다. 문의하신 내용과 관련된 자료를 찾지 못해 정확한 답변을 드리기 어렵습니다. 질문을 조금 더 구체적으로 말씀해 주시겠어요?"

  # Faithfulness guard
  number_missing: "답변의 숫자 {numbers}이(가) 참고 문서에서 확인되지 않았습니다."
  cooccurrence_fail: "숫자 '{a}'와 '{b}'가 같은 문서 청크에 공존하지 않습니다."
  citation_missing: "인용된 문서 '{cite}'가 참고 문서에 없습니다."
  deep_eval_fail: "LLM 근거 검증 실패: {reason}"
  pii_detected: "개인정보 감지: {types}"

  # Workflow
  workflow_completed: "워크플로우가 완료되었습니다."
  workflow_cancelled: "워크플로우가 취소되었습니다. 다른 질문이 있으시면 말씀해주세요."
  workflow_already_completed: "이미 완료된 워크플로우입니다."
  workflow_not_found: "워크플로우를 찾을 수 없습니다: {workflow_id}"
  workflow_empty: "워크플로우에 스텝이 없습니다: {workflow_id}"
  workflow_no_session: "활성 워크플로우 세션이 없습니다"
  workflow_step_missing: "다음 스텝({step_id})을 찾을 수 없습니다."
  workflow_step_error: "스텝 오류"
  workflow_retry_limit: "입력이 지연되어 진행을 취소합니다. 다른 도움이 필요하시면 말씀해주세요."
  workflow_first_step: "첫 번째 단계입니다. 더 이상 뒤로 갈 수 없습니다."
  workflow_escape_hint: "_(\"나가기\" 또는 \"취소\"를 입력하면 워크플로우를 종료합니다)_"

labels:
  role_user: "사용자"
  role_assistant: "어시스턴트"
  domain_all: "전체"
  history_none: "(없음)"
  pii_masked_suffix: "마스킹됨"

# 언어 패턴 (regex)
# ── 라우팅 의미 판단(인사·비교·시스템질문)은 여기 없다 ──
# greeting·system_meta·comparison_markers는 2026-07-20에 삭제했다. 전역 정규식이
# 도메인·언어에 튜닝돼 "고맙게도"를 인사로, "차이나타운"을 비교로 오판했다(진단 V3/V5/V6).
# 그 판단은 IntentClassifier._classify_with_llm이 프로필 신호와 함께 LLM으로 한다.
# 여기 남은 것은 결정적 단축(followup 대명사)과 라우팅 아닌 신호(no_answer·pronoun·escape).
patterns:
  # 이력 기반 후속 단축 — 대명사성 신호는 결정성이 품질보다 중요한 "극소수" (IntentClassifier._detect_followup)
  followup_markers: ["그러면", "그럼", "그래서", "그건", "이건", "그리고"]
  short_followup_markers: ["더 ", "또 ", "더는", "또한"]
  same_doc_markers: ["같은 문서", "이 문서", "위 문서", "방금 문서"]
  # 무답변 판정 마커 — 라우팅이 아니라 답변 사후, "정보 부재" 정형 문구 감지 → 검색 확장 재시도.
  no_answer_markers: ["확인이 필요합니다", "포함되어 있지 않습니다", "명시되어 있지 않습니다", "명시적 내용은 없", "문서에는 없", "찾을 수 없습니다"]

  escape_keywords: ["취소", "처음으로", "나가기", "중단", "그만", "exit", "cancel", "quit"]
  back_keywords: ["뒤로", "이전", "돌아가기", "back", "prev"]

  # 대명사 해소(Layer 0 ContextResolver) — 라우팅 유형이 아니라 질의 재작성용. 감지만 하고 해소는 LLM.
  pronoun:
    - pattern: "^(그|이|저)(것|거|건|게)\\s"
      confidence: 0.9
    - pattern: "^(그|이|저)(문서|상품|보험|약관)"
      confidence: 0.9
    - pattern: "^(위|앞|방금)\\s*(것|거|내용)"
      confidence: 0.85
    - pattern: "^(더|또)\\s*(알려|설명|자세)"
      confidence: 0.8


# 숫자 추출 패턴 (faithfulness 검증)
number_patterns:
  - "\\d{1,3}(?:,\\d{3})+"
  - "\\d+(?:\\.\\d+)?%"
  - "\\d+(?:\\.\\d+)?만"
  - "\\d+(?:\\.\\d+)?억"
  - "\\d+(?:\\.\\d+)?원"
  - "\\d+(?:~\\d+)"
  - "\\d+[급종호조항]"

# 인용 파일 확장자
citation_extensions: ["pdf", "csv", "md", "xlsx", "docx", "pptx", "txt"]

# PII 감지 패턴 (safety guardrail)
pii_patterns:
  - pattern: "\\d{6}[-\\s]?\\d{7}"
    label: "주민등록번호"
  - pattern: "\\d{3}[-\\s]?\\d{4}[-\\s]?\\d{4}"
    label: "전화번호"
  - pattern: "\\d{3}[-\\s]?\\d{2}[-\\s]?\\d{5}"
    label: "사업자번호"

# PII 마스킹 패턴 (result guard - 검색 결과 전처리)
pii_result_guard:
  - pattern: "\\d{6}-[1-4]\\d{6}"
    replacement: "[주민번호]"
  - pattern: "01[016789]-\\d{3,4}-\\d{4}"
    replacement: "[전화번호]"
  - pattern: "\\d{3,6}-\\d{2,6}-\\d{2,6}"
    replacement: "[계좌번호]"

# 입력 검증 패턴 (workflow)
validators:
  phone: "^01[016789]-?\\d{3,4}-?\\d{4}$"
  email: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
  number: "^\\d+$"
  date: "^\\d{4}-\\d{2}-\\d{2}$"

# 검증 실패 안내 메시지
validation_hints:
  phone: "전화번호 형식이 올바르지 않습니다. (예: 010-1234-5678)"
  email: "이메일 형식이 올바르지 않습니다. (예: user@example.com)"
  number: "숫자만 입력해주세요."
  date: "날짜 형식이 올바르지 않습니다. (예: 2026-03-13)"

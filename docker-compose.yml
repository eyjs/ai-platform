services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aip
      POSTGRES_PASSWORD: aip_dev
      POSTGRES_DB: ai_platform
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip -d ai_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-platform:
    build: .
    ports:
      - "8010:8000"
    environment:
      AIP_DATABASE_URL: postgresql://aip:aip_dev@postgres:5432/ai_platform
      AIP_PROVIDER_MODE: development
      # MLX GPU 서버 (호스트에서 실행 중)
      AIP_EMBEDDING_SERVER_URL: http://host.docker.internal:8103
      AIP_RERANKER_SERVER_URL: http://host.docker.internal:8102
      AIP_ROUTER_LLM_SERVER_URL: http://host.docker.internal:8104
      AIP_MAIN_LLM_SERVER_URL: http://host.docker.internal:8105
      # 인증
      AIP_AUTH_REQUIRED: "true"
      AIP_JWT_SECRET: "dev-jwt-secret-change-in-production"
      # 로깅
      AIP_LOG_FORMAT: json
      AIP_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./seeds:/app/seeds

volumes:
  pgdata:

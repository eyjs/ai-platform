services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aip
      POSTGRES_PASSWORD: aip_dev
      POSTGRES_DB: ai_platform
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip -d ai_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: aip-api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8010:8000"
    command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: &shared-env
      AIP_DATABASE_URL: postgresql://aip:aip_dev@postgres:5432/ai_platform
      AIP_PROVIDER_MODE: development
      # MLX GPU 서버 (호스트에서 실행 중) — Qwen3.5 마이그레이션
      AIP_EMBEDDING_SERVER_URL: http://host.docker.internal:8103
      AIP_RERANKER_SERVER_URL: http://host.docker.internal:8102
      AIP_ROUTER_LLM_SERVER_URL: http://host.docker.internal:8105  # 9B — 경량 (Intent 분류)
      AIP_MAIN_LLM_SERVER_URL: http://host.docker.internal:8105    # 9B — 속도 우선 (채팅 응답)
      # 오케스트레이터 (9B — 프로필 선택은 경량 작업)
      AIP_ORCHESTRATOR_MODEL: mlx-community/Qwen3.5-9B-4bit
      AIP_ORCHESTRATOR_SERVER_URL: http://host.docker.internal:8105
      # 인증
      AIP_AUTH_REQUIRED: "true"
      AIP_JWT_SECRET: "dev-jwt-secret-change-in-production"
      # KMS 연동
      AIP_KMS_API_URL: http://kms-api:3000/api
      AIP_KMS_INTERNAL_KEY: ${INTERNAL_KEY:-dev_internal_key_32_chars_minimum}
      AIP_KMS_WEBHOOK_SECRET: ${KMS_WEBHOOK_SECRET:-dev_webhook_secret_32_chars_min}
      # 로깅
      AIP_LOG_FORMAT: json
      AIP_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - kms-aip-shared
    volumes:
      - ./seeds:/app/seeds

  worker:
    build: .
    command: ["python", "-m", "src.worker_main"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *shared-env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - kms-aip-shared
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10

networks:
  kms-aip-shared:
    external: true

volumes:
  pgdata:

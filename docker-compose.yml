services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aip
      POSTGRES_PASSWORD: aip_dev
      POSTGRES_DB: ai_platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip -d ai_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-platform:
    build: .
    ports:
      - "8000:8000"
    environment:
      AIP_DATABASE_URL: postgresql://aip:aip_dev@postgres:5432/ai_platform
      AIP_OLLAMA_HOST: http://host.docker.internal:11434
      AIP_PROVIDER_MODE: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./seeds:/app/seeds

volumes:
  pgdata:

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: aip
      POSTGRES_PASSWORD: aip_dev
      POSTGRES_DB: ai_platform
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip -d ai_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aip-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8020:8000"
    command: ["python", "-m", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment: &shared-env
      AIP_DATABASE_URL: postgresql://aip:aip_dev@postgres:5432/ai_platform
      # ── LLM 스위치(딸깍): AIP_PROVIDER_MODE 하나로 메인/에이전틱/오케스트레이터 전부 전환 ──
      #   anthropic   = Claude Haiku (프로덕션, 키는 루트 .env에서 주입)
      #   development = MLX (아래 MLX 블록 주석 해제 + PROVIDER_MODE=development)
      AIP_PROVIDER_MODE: anthropic
      AIP_ANTHROPIC_API_KEY: ${AIP_ANTHROPIC_API_KEY}
      AIP_ANTHROPIC_MAIN_MODEL: claude-haiku-4-5
      AIP_ANTHROPIC_ROUTER_MODEL: claude-haiku-4-5
      # 임베딩/리랭커는 모드와 무관하게 항상 MLX (Anthropic 임베딩 없음 + 기존 코퍼스 동일 모델)
      # DGX Spark(원격 GPU, Tailscale) — 설정 시 모든 LLM 역할이 DGX 우선, 단절 시 로컬 자동 폴백.
      # 값은 루트 .env에서 주입 (미설정이면 기능 비활성 = 현행 로컬 그대로).
      AIP_DGX_LLM_URL: ${AIP_DGX_LLM_URL:-}
      AIP_DGX_MAIN_MODEL: ${AIP_DGX_MAIN_MODEL:-qwen3.6:35b-a3b}
      # 역할별 모델. 전부 비우면 MAIN 하나를 공유(권장) — 섞으면 ollama가 evict↔reload한다.
      AIP_DGX_REPORT_MODEL: ${AIP_DGX_REPORT_MODEL:-}
      AIP_DGX_ROUTER_MODEL: ${AIP_DGX_ROUTER_MODEL:-}
      AIP_DGX_ORCHESTRATOR_MODEL: ${AIP_DGX_ORCHESTRATOR_MODEL:-}
      AIP_DGX_FORTUNE_MODEL: ${AIP_DGX_FORTUNE_MODEL:-}
      # false(기본)=DGX 단독, 로컬 MLX 의존 걷어냄. true=DGX 단절 시 로컬 폴백.
      AIP_DGX_LOCAL_FALLBACK: ${AIP_DGX_LOCAL_FALLBACK:-false}
      AIP_EMBEDDING_SERVER_URL: http://host.docker.internal:8103
      AIP_RERANKER_SERVER_URL: http://host.docker.internal:8102
      # 하이브리드: 무료 콘텐츠 전용 로컬 MLX(8106=Qwen3.5-9B). get_local_llm 전용 변수.
      # ★main_llm_server_url과 분리 — 챗 모델 자동감지(bootstrap)가 8106 모델명을 Anthropic에
      # 넘겨 오염시키던 버그 방지. main_llm은 anthropic 모드라 Haiku 유지.
      AIP_FORTUNE_LLM_SERVER_URL: http://host.docker.internal:8106
      # ── development(MLX) 복귀 시: PROVIDER_MODE=development + 아래 주석 해제 ──
      # AIP_ROUTER_LLM_SERVER_URL: http://host.docker.internal:8105
      # AIP_ORCHESTRATOR_MODEL: mlx-community/Qwen3-8B-4bit
      # AIP_ORCHESTRATOR_SERVER_URL: http://host.docker.internal:8105
      # 인증
      AIP_AUTH_REQUIRED: "true"
      AIP_JWT_SECRET: ${AIP_JWT_SECRET:-dev-jwt-secret-change-in-production}
      # JWT 비대칭 검증 (D17, Step 13). api는 공개키만 가진다(개인키는 bff 전용).
      # RS256 전환 검증 후 AIP_JWT_HS256_FALLBACK=false로 대칭키를 퇴역.
      AIP_JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
      AIP_JWT_HS256_FALLBACK: "true"
      # 프로필 인가 deny-by-default (A1, Step 1). 백필(backfill_profile_authz) 적용 후 활성화됨.
      AIP_PROFILE_AUTH_STRICT: "true"
      # RLS 심층방어 (A2, Step 4c). 마이그레이션 019/020 적용 + tenant_id 백필 완료 후 활성화됨.
      AIP_RLS_ENABLED: "true"
      # KMS 연동
      AIP_KMS_API_URL: http://kms-api:3000/api
      AIP_KMS_INTERNAL_KEY: ${INTERNAL_KEY:-dev_internal_key_32_chars_minimum}
      AIP_KMS_WEBHOOK_SECRET: ${KMS_WEBHOOK_SECRET:-dev_webhook_secret_32_chars_min}
      # DocForge 파싱 서비스 (컨테이너 간 통신)
      AIP_PARSER_PROVIDER: engine
      AIP_DOCFORGE_URL: http://docforge:5051
      AIP_DOCFORGE_INTERNAL_KEY: ${DOCFORGE_INTERNAL_KEY:-dev-docforge-key-change-in-production}
      # 사주 백엔드 (호스트에서 실행 중인 saju-backend)
      AIP_SAJU_BACKEND_URL: http://host.docker.internal:8002
      # FlowSNS 챗봇 연동 (호스트의 flowsns-api 컨테이너)
      AIP_FLOWSNS_API_URL: http://host.docker.internal:3021
      AIP_FLOWSNS_API_KEY: fsk_9b50a293334c4d57bd73c42c2f6d30355caf23bb01b7276b4247e637c635de78
      # 로깅
      AIP_LOG_FORMAT: json
      AIP_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - kms-aip-shared
    volumes:
      - ./apps/api/seeds:/app/seeds
      # D17: JWT 공개키만 마운트 (개인키는 api에 두지 않는다)
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro

  worker:
    # ⚠️ restart 정책은 "한 번도 시작 못 한(Created)" 컨테이너를 구조하지
    # 않는다 — 부분 up 후 worker 가 Created 로 방치된 인시던트(2026-07-07).
    # 재기동은 반드시 `docker compose up -d --build worker` 로, 상태 확인은
    # `docker compose ps worker` 로 할 것.
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aip-worker
    command: ["python", "-m", "src.worker_main"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *shared-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # worker 루프가 120s 주기로 /tmp/worker.alive 를 touch 한다
      test: ["CMD-SHELL", "find /tmp/worker.alive -mmin -3 | grep -q worker.alive"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 90s
    networks:
      - default
      - kms-aip-shared
    volumes:
      # worker도 bootstrap에서 공개키 경로를 읽으므로 동일 마운트 필요
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro

  bff:
    build:
      context: .
      dockerfile: apps/bff/Dockerfile
    container_name: aip-bff
    restart: unless-stopped
    ports:
      - "3011:3001"
    environment:
      NODE_ENV: production
      BFF_PORT: 3001
      DATABASE_URL: postgresql://aip:aip_dev@postgres:5432/ai_platform
      # bff가 api로 중계하는 호출(피드백 등). docker 네트워크상 api 서비스명:내부포트.
      # 미설정 시 localhost:8000(=bff 자신) → 502 API_UNREACHABLE.
      AIP_API_URL: http://api:8000
      JWT_SECRET: ${AIP_JWT_SECRET:-dev-jwt-secret-change-in-production}
      # D17: bff가 개인키로 RS256 서명, 공개키로 자체 검증. 개인키는 bff에만.
      AIP_JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private.pem
      AIP_JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
      AIP_JWT_HS256_FALLBACK: "true"
      CORS_ORIGIN: "http://localhost:3000,https://ai-platform-eight-sigma.vercel.app"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - kms-aip-shared
    volumes:
      - ./secrets/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro

networks:
  kms-aip-shared:
    external: true

volumes:
  pgdata:
